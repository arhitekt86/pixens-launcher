<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pixens Launcher</title>

<!-- Fonts: pixel display + retro mono -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  /* dynamic scale: shrink the 1280×800 app to fit the user's viewport */
  html, body { background: #000; }
  .stage { transform-origin: center center; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="tweaks-panel.jsx"></script>
  <script type="text/babel" data-presets="react" src="ui.jsx"></script>
  <script type="text/babel" data-presets="react" src="screens.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script>
    // Scale-to-fit: launcher is a fixed 1280×800 surface; shrink to viewport.
    function fitApp() {
      const stage = document.querySelector(".stage");
      if (!stage) { requestAnimationFrame(fitApp); return; }
      const W = 1280, H = 800, pad = 24;
      const sx = (window.innerWidth  - pad * 2) / W;
      const sy = (window.innerHeight - pad * 2) / H;
      const s = Math.min(1, Math.min(sx, sy));
      const app = stage.querySelector(".app") || stage.querySelector(".installer");
      if (app) app.style.transform = `scale(${s})`;
      stage.style.setProperty("--dc-inv-zoom", String(1 / Math.max(s, 0.0001)));
    }
    new ResizeObserver(fitApp).observe(document.documentElement);
    window.addEventListener("load", fitApp);
    window.addEventListener("resize", fitApp);
    setInterval(fitApp, 500); // catch view swaps that re-mount .app
  </script>
</body>
</html>
